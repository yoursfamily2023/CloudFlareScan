name: 打包 Cloudflare Scan EXE (带图标)

on:
  push:
    branches: [ "main" ]  # 当你推送到 main 分支时触发
  workflow_dispatch:      # 允许手动触发打包

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # 这里使用你代码中实际需要的依赖，基于你的代码，是 PySide6 和 aiohttp
        pip install PySide6 aiohttp

    - name: 使用 PyInstaller 打包
      run: |
        # --onefile: 生成单个 exe
        # --noconsole: GUI 程序不显示命令行窗口
        # --icon: 指定你的图标文件 (必须在仓库根目录下存在 cfs.ico)
        # --name: 指定生成的 exe 文件名
        pyinstaller --onefile --noconsole --icon="cfs.ico" --name "CloudflareScan" main.py

    - name: 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: CloudflareScan-Windows-with-Icon
        path: dist/*.exe
