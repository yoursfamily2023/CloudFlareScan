name: 打包 Cloudflare Scan EXE

on:
  push:
    branches: [ "main" ]  # 当你推送到 main 分支时触发
  workflow_dispatch:      # 允许手动触发打包

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: 使用 PyInstaller 打包
      run: |
        # --onefile: 生成单个 exe
        # --noconsole: GUI 程序不显示命令行窗口
        # --icon: 指定图标（确保仓库里有 cfs.ico，否则删掉这行）
        # --name: 指定生成的 exe 文件名
        pyinstaller --onefile --noconsole --icon="cfs.ico" --name "CloudflareScan" main.py

    - name: 上传成品
      uses: actions/upload-artifact@v4
      with:
        name: CloudflareScan-Windows
        path: dist/*.exe
